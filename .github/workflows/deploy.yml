name: Deploy to donge.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy workflow
        run: |
          mkdir -p dist/.github/workflows
          cat > dist/.github/workflows/deploy.yml << 'EOF'
          name: Deploy Pages

          on:
            push:
              branches: [master]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: "pages"
            cancel-in-progress: false

          jobs:
            deploy:
              runs-on: ubuntu-latest
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Pages
                  uses: actions/configure-pages@v5

                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: "."

                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          EOF

      - name: Verify token
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "$PAGES_DEPLOY_TOKEN" ]; then
            echo "ERROR: PAGES_DEPLOY_TOKEN is empty or not set"
            exit 1
          fi
          echo "Token length: ${#PAGES_DEPLOY_TOKEN}"
          # Test token against GitHub API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $PAGES_DEPLOY_TOKEN" \
            https://api.github.com/repos/donge/donge.github.io)
          echo "API status for donge/donge.github.io: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Token cannot access donge/donge.github.io (HTTP $STATUS)"
            exit 1
          fi

      - name: Push to donge.github.io
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          cd dist
          git init
          git checkout -b master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ) @ ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/donge/donge.github.io.git"
          GIT_TRACE=1 git push --force origin master 2>&1 || true
          git push --force origin master
